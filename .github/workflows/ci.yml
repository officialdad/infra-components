name: ci

# Lint + validate every module on PRs and pushes to main.
# No cloud credentials needed — validation runs with the backend disabled.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Derive the component list from the filesystem (every dir with a terraform/ subdir) so a new
  # component is validated automatically — no hand-maintained matrix to forget (see issue #21).
  discover:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.list.outputs.components }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: list
        name: enumerate changed components (dirs containing terraform/)
        run: |
          # Full component list — filesystem truth, same logic as before.
          ALL="$(find . -mindepth 2 -maxdepth 2 -type d -name terraform -not -path './.*' \
            -printf '%h\n' | sed 's|^\./||' | sort | jq -R . | jq -cs .)"

          # Resolve diff range for PR vs push.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # Force-push, initial branch push, or unreachable base — no valid range, run all.
          if [[ "$BASE" == "0000000000000000000000000000000000000000" ]] || \
             ! git cat-file -t "$BASE" > /dev/null 2>&1; then
            echo "components=$ALL" >> "$GITHUB_OUTPUT"
            echo "No valid base SHA — running all components: $ALL"
            exit 0
          fi

          # Any change to shared Terraform config affects every component — run all.
          if git diff --name-only "$BASE" "$HEAD" -- \
              .tflint.hcl .terraform-version .github/workflows/ci.yml | grep -q .; then
            echo "components=$ALL" >> "$GITHUB_OUTPUT"
            echo "Shared config changed — running all components: $ALL"
            exit 0
          fi

          # Emit only the components that contain changed Terraform files.
          COMPONENTS="$(
            git diff --name-only "$BASE" "$HEAD" \
              -- '*/terraform/*.tf' '*/terraform/*.tofu' '*/terraform/*.tfvars' \
            | sed -n 's|^\([^/]*\)/terraform/.*|\1|p' \
            | sort -u \
            | jq -R . | jq -cs .
          )"
          echo "components=$COMPONENTS" >> "$GITHUB_OUTPUT"
          if [[ "$COMPONENTS" == "[]" ]]; then
            echo "No Terraform files changed — validate will be skipped."
          else
            echo "Changed components: $COMPONENTS"
          fi

  validate:
    needs: discover
    if: needs.discover.outputs.components != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.discover.outputs.components) }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5

      - name: terraform fmt
        run: terraform -chdir=${{ matrix.component }}/terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform -chdir=${{ matrix.component }}/terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform -chdir=${{ matrix.component }}/terraform validate

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: tflint
        run: |
          cd ${{ matrix.component }}/terraform
          tflint --init --config="$GITHUB_WORKSPACE/.tflint.hcl"
          tflint --config="$GITHUB_WORKSPACE/.tflint.hcl"

  # Docs: component README Inputs/Outputs tables are up to date (terraform-docs), the required README
  # structure is present, and markdown style holds. Mirrors the local pre-commit docs hooks.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install terraform-docs
        run: |
          curl -sSfL -o td.tgz \
            https://github.com/terraform-docs/terraform-docs/releases/download/v0.24.0/terraform-docs-v0.24.0-linux-amd64.tar.gz
          tar -xzf td.tgz terraform-docs
          sudo install -m 0755 terraform-docs /usr/local/bin/terraform-docs
          terraform-docs version

      - name: README tables up to date (terraform-docs)
        run: bash scripts/gen-docs.sh --check

      - name: README structure
        run: bash scripts/check-readme-structure.sh

      - uses: DavidAnson/markdownlint-cli2-action@v23.2.0
        with:
          globs: |
            README.md
            CLAUDE.md
            */README.md

  # Canary for issue #21: the local pre-commit Terraform hooks once reported "(no files to check)" on a
  # brand-new component, so its fmt/validate/tflint silently never ran on commit (false confidence). Re-run
  # the fmt hook over the PR's changed range and fail loudly if it skips changed Terraform.
  precommit-coverage:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5

      - name: install pre-commit
        run: pipx install pre-commit

      - name: assert Terraform hooks cover the PR's changed .tf
        run: scripts/check-precommit-tf-coverage.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
