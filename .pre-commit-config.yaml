# Pre-commit hooks for the Terraform module library.
# Install once:  pipx install pre-commit  (or pip)  &&  pre-commit install
# Run on all files:  pre-commit run --all-files
#
# tflint hook needs tflint installed locally:  https://github.com/terraform-linters/tflint
#
# `pre-commit install` wires both stages below (pre-commit + commit-msg) via
# default_install_hook_types — run it once per clone.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.108.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
      - id: check-yaml

  # Enforce Conventional Commits on the commit-msg stage (type(scope): subject).
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Lint GitHub Actions workflows. The `actionlint` hook is built via Go (no Docker).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Markdown style for the human docs (component READMEs + root README + CLAUDE.md). Node-based, so
  # pre-commit builds it in an isolated env — no global install. Config: .markdownlint.yaml.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        files: '(^README\.md$|^CLAUDE\.md$|^[^/]+/README\.md$)'

  # Component README docs: regenerate the Inputs/Outputs tables from .tf (terraform-docs, graceful if
  # absent) and assert each README's required structure. See scripts/gen-docs.sh, check-readme-structure.sh.
  - repo: local
    hooks:
      - id: terraform-docs-gen
        name: terraform-docs (generate component README tables)
        entry: scripts/gen-docs.sh
        language: script
        files: '\.tf$'
        pass_filenames: false
      - id: readme-structure
        name: component README structure
        entry: scripts/check-readme-structure.sh
        language: script
        files: '(README\.md$|\.tf$)'
        pass_filenames: false
