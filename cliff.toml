# git-cliff config — the SINGLE SOURCE of release notes, generated from Conventional Commits.
# Consumed by both:
#   - scripts/release.sh: generates the new `## [X.Y.Z]` section and splices it into CHANGELOG.md at
#     release time (`git-cliff --unreleased --tag vX.Y.Z`). History ≤ v0.6.0 is frozen, not regenerated.
#   - .github/workflows/changelog.yml: PRs preview the next tag's notes as a comment; the tag push
#     publishes the GitHub Release from this same config — so CHANGELOG.md == the Release notes.
# No hand-curation: the commit subjects ARE the entries (scope = component → per-component grouping).
# The soak gate + manual tagging stay (see README "Versioning & releasing"). git-cliff never
# auto-tags and never commits to main.

[changelog]
header = ""
# Lean Keep a Changelog body: one line per change, grouped, scope-prefixed.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{% if commit.breaking %}**[breaking]** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.remote.pr_number %} (#{{ commit.remote.pr_number }}){% endif %}
{% endfor %}\
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true   # drop non-conventional commits (merges, etc.) from the changelog
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"
# Map conventional types -> Keep a Changelog sections (ordered via comment prefixes).
# docs/chore/ci/test/style/build are internal — skipped (a breaking one is still kept).
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 1 -->Fixed" },
  { message = "^refactor", group = "<!-- 2 -->Changed" },
  { message = "^perf", group = "<!-- 2 -->Changed" },
  { message = "^revert", group = "<!-- 3 -->Removed" },
  { message = "^docs", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
  { message = "^style", skip = true },
  { message = "^build", skip = true },
]

# PR links in entries (optional — needs a token at runtime; harmless without one).
[remote.github]
owner = "officialdad"
repo = "infra-components"
